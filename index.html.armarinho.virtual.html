<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Armarinho Virtual🩷</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fff5f6;
    --bg-secondary: #fae8e8;
    --bg-tertiary: #c97070;
    --text: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #a0a09c;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --font: 'Segoe UI', system-ui, sans-serif;
    --teal-light: #E1F5EE;
    --teal: #0F6E56;
    --amber-light: #FAEEDA;
    --amber: #854F0B;
    --blue-light: #E6F1FB;
    --blue: #185FA5;
    --green-light: #EAF3DE;
    --green: #3B6D11;
    --red-light: #FCEBEB;
    --red: #A32D2D;
  }

  @media (color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text: #f0efea;
      --text-secondary: #a0a09c;
      --text-tertiary: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
      --teal-light: #04342C;
      --teal: #5DCAA5;
      --amber-light: #412402;
      --amber: #FAC775;
      --blue-light: #042C53;
      --blue: #85B7EB;
      --green-light: #173404;
      --green: #97C459;
      --red-light: #501313;
      --red: #F09595;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.25rem;
  }

  .header {
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-text-wrap {
    position: relative;
    display: inline-block;
    padding: 16px 36px 18px 22px;
    border-radius: 18px;
    overflow: hidden;
  }
  .header-text-wrap svg.brush {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    z-index: 0;
    pointer-events: none;
  }
  .header-text-wrap h1,
  .header-text-wrap p { position: relative; z-index: 1; }
  .header h1 { font-size: 24px; font-weight: 600; color: #1a1a18; }
  .header p { font-size: 14px; color: #1a1a18; margin-top: 3px; font-weight: 500; }
  .save-indicator { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 5px; }
  .save-indicator.saved { color: var(--green); }
  .save-indicator i { font-size: 14px; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .tab {
    font-size: 14px; padding: 10px 18px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-secondary); cursor: pointer;
    margin-bottom: -1px; transition: color 0.15s; font-family: var(--font);
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 1.25rem; align-items: center; flex-wrap: wrap;
  }
  .toolbar input[type=text] { flex: 1; min-width: 160px; }

  input[type=text], input[type=color], select, textarea {
    font-family: var(--font); font-size: 14px;
    background: var(--bg); color: var(--text);
    border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
    padding: 8px 12px; outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, select:focus, textarea:focus { border-color: var(--text-secondary); }
  select { cursor: pointer; }
  textarea { resize: vertical; min-height: 72px; width: 100%; }

  .btn-primary {
    background: var(--text); color: var(--bg);
    border: none; padding: 9px 16px; border-radius: var(--radius-md);
    font-size: 14px; cursor: pointer; font-family: var(--font);
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.82; }
  .btn-outline {
    background: none; border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md); padding: 9px 16px;
    font-size: 14px; color: var(--text); cursor: pointer; font-family: var(--font);
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-outline:hover { background: var(--bg-secondary); }
  .btn-danger {
    background: none; border: 0.5px solid var(--red);
    border-radius: var(--radius-md); padding: 9px 16px;
    font-size: 14px; color: var(--red); cursor: pointer; font-family: var(--font);
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-danger:hover { background: var(--red-light); }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px;
  }

  .project-card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
    cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  }
  .project-card:hover { border-color: var(--border-md); transform: translateY(-1px); }
  .project-card .img-area {
    height: 150px; background: var(--bg-secondary);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .project-card .img-area img { width: 100%; height: 100%; object-fit: cover; }
  .project-card .img-area .no-img { color: var(--text-tertiary); font-size: 36px; }
  .project-card .card-body { padding: 12px 14px 14px; }
  .project-card .card-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .project-card .card-meta { font-size: 12px; color: var(--text-secondary); }
  .yarn-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .yarn-pill {
    font-size: 11px; padding: 2px 9px; border-radius: 99px;
    font-weight: 500;
  }

  .status-badge {
    font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 500;
  }
  .status-badge.abs { position: absolute; top: 8px; right: 8px; }
  .status-planejado { background: var(--blue-light); color: var(--blue); }
  .status-em-andamento { background: var(--amber-light); color: var(--amber); }
  .status-concluido { background: var(--green-light); color: var(--green); }

  .yarns-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 12px;
  }
  .yarn-card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    display: flex; gap: 14px; align-items: flex-start;
    cursor: pointer; transition: border-color 0.15s;
  }
  .yarn-card:hover { border-color: var(--border-md); }
  .yarn-swatch { width: 42px; height: 42px; border-radius: 50%; border: 0.5px solid var(--border); flex-shrink: 0; }
  .yarn-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .yarn-detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .yarn-stock { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 200; padding: 40px 16px 40px; overflow-y: auto;
  }
  .modal {
    background: var(--bg); border-radius: var(--radius-xl);
    border: 0.5px solid var(--border-md);
    width: 100%; max-width: 520px;
    position: relative;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.1rem 1.25rem; border-bottom: 0.5px solid var(--border);
  }
  .modal-header h2 { font-size: 16px; font-weight: 500; color: var(--text); }
  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-secondary); font-size: 22px; line-height: 1; padding: 0;
    display: flex; align-items: center;
  }
  .modal-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 16px; }
  .modal-footer {
    padding: 1rem 1.25rem; border-top: 0.5px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap;
  }

  .field label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; }
  .field input[type=text] { width: 100%; }

  .img-upload-area {
    border: 0.5px dashed var(--border-md); border-radius: var(--radius-md);
    height: 130px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; position: relative; overflow: hidden;
    transition: background 0.15s;
  }
  .img-upload-area:hover { background: var(--bg-secondary); }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-upload-area .up-text { font-size: 13px; color: var(--text-secondary); pointer-events: none; }
  .img-upload-area i { pointer-events: none; }
  .img-upload-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

  .yarn-checklist { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
  .yarn-check-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    border-radius: var(--radius-md); cursor: pointer; transition: background 0.12s;
  }
  .yarn-check-item:hover { background: var(--bg-secondary); }
  .yarn-check-item input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--text); }
  .swatch-sm { width: 16px; height: 16px; border-radius: 50%; border: 0.5px solid var(--border); flex-shrink: 0; }
  .yarn-check-item span { font-size: 13px; color: var(--text); }

  .detail-img {
    width: 100%; height: 230px; object-fit: cover;
    border-radius: var(--radius-md); background: var(--bg-secondary);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .detail-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 5px; }

  .empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--text-tertiary); grid-column: 1/-1; }
  .empty-state i { font-size: 42px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .used-in-item {
    font-size: 13px; padding: 5px 0; color: var(--text);
    display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--border);
  }
  .used-in-item:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-text-wrap" id="brush-wrap">
      <canvas id="brush-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
      <h1 style="position:relative;z-index:1;"> Armarinho Virtual🩷</h1>
      <p style="position:relative;z-index:1;">Guarde as informações dos seus projetos pra não se perder!</p>
    </div>
    <script>
    (function(){
      function drawBrush(){
        var wrap = document.getElementById('brush-wrap');
        var canvas = document.getElementById('brush-canvas');
        if(!wrap||!canvas) return;
        var W = wrap.offsetWidth, H = wrap.offsetHeight;
        canvas.width = W; canvas.height = H;
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,W,H);

        // Build zigzag spine: diagonal strokes going across the whole area
        // Each "zig" goes diagonally like the reference image (top-left to bottom-right)
        // but arranged in a continuous zigzag left-to-right

        var angle = -50 * Math.PI / 180; // diagonal angle like reference
        var strokeH = H + 30; // height of each stroke
        var strokeW = strokeH * Math.tan(Math.abs(angle)); // horizontal span
        var gap = strokeW * 0.55; // overlap between strokes

        // Total strokes needed to fill width
        var numStrokes = Math.ceil((W + strokeW) / gap) + 2;

        ctx.save();

        for(var s = -1; s < numStrokes; s++){
          var xBase = s * gap - strokeW/2;
          // zigzag: alternate direction
          var dir = (s % 2 === 0) ? 1 : -1;

          // top and bottom points of this stroke
          var x1 = xBase + (dir > 0 ? 0 : strokeW);
          var y1 = -10;
          var x2 = xBase + (dir > 0 ? strokeW : 0);
          var y2 = H + 10;

          drawGrungeLine(ctx, x1, y1, x2, y2, strokeW * 0.82);
        }

        ctx.restore();
      }

      function drawGrungeLine(ctx, x1, y1, x2, y2, thickness){
        var dx = x2-x1, dy = y2-y1;
        var len = Math.sqrt(dx*dx+dy*dy);
        var nx = -dy/len, ny = dx/len; // normal

        // Main body
        ctx.beginPath();
        ctx.moveTo(x1 + nx*thickness*0.5, y1 + ny*thickness*0.5);
        ctx.bezierCurveTo(
          x1 + nx*thickness*0.55 + dx*0.3, y1 + ny*thickness*0.55 + dy*0.3,
          x2 + nx*thickness*0.45 + dx*0.0, y2 + ny*thickness*0.45 + dy*0.0,
          x2 + nx*thickness*0.5, y2 + ny*thickness*0.5
        );
        ctx.lineTo(x2 - nx*thickness*0.5, y2 - ny*thickness*0.5);
        ctx.bezierCurveTo(
          x2 - nx*thickness*0.45 + dx*0.0, y2 - ny*thickness*0.45 + dy*0.0,
          x1 - nx*thickness*0.55 + dx*0.3, y1 - ny*thickness*0.55 + dy*0.3,
          x1 - nx*thickness*0.5, y1 - ny*thickness*0.5
        );
        ctx.closePath();
        ctx.fillStyle = 'rgba(255,248,240,0.92)';
        ctx.fill();

        // Grunge bristle strokes on edges
        var numBristles = 18;
        for(var i=0;i<numBristles;i++){
          var t = i/numBristles;
          var bx = x1+dx*t, by = y1+dy*t;
          var spread = thickness*0.5 + Math.random()*thickness*0.22;
          var blen = (2+Math.random()*10);
          var side = (Math.random()>0.5?1:-1);
          ctx.beginPath();
          ctx.moveTo(bx + nx*spread*side, by + ny*spread*side);
          ctx.lineTo(
            bx + nx*(spread+blen)*side + dx*0.02*(Math.random()-0.5),
            by + ny*(spread+blen)*side + dy*0.02*(Math.random()-0.5)
          );
          ctx.strokeStyle = 'rgba(255,248,240,'+(0.3+Math.random()*0.5)+')';
          ctx.lineWidth = 0.5+Math.random()*1.5;
          ctx.stroke();
        }

        // Texture dots/gaps inside
        for(var i=0;i<12;i++){
          var t = Math.random();
          var bx = x1+dx*t, by = y1+dy*t;
          var off = (Math.random()-0.5)*thickness*0.6;
          ctx.beginPath();
          ctx.arc(bx+nx*off, by+ny*off, 0.5+Math.random()*2, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(201,112,106,'+(0.05+Math.random()*0.12)+')';
          ctx.fill();
        }
      }

      window.addEventListener('load', drawBrush);
      window.addEventListener('resize', drawBrush);
    })();
    </script>
    <div class="save-indicator saved" id="save-indicator" style="display:none">
      <i class="ti ti-device-floppy"></i> <span>Salvo automaticamente</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('projetos')"><i class="ti ti-needle-thread"></i> Projetos</button>
    <button class="tab" onclick="showTab('linhas')"><i class="ti ti-ball-football"></i> Minhas linhas</button>
  </div>

  <div id="tab-projetos">
    <div class="toolbar">
      <input type="text" id="search-proj" placeholder="Buscar projetos..." oninput="renderProjects()" />
      <select id="filter-status" onchange="renderProjects()">
        <option value="">Todos os status</option>
        <option value="planejado">Planejado</option>
        <option value="em-andamento">Em andamento</option>
        <option value="concluido">Concluído</option>
      </select>
      <button class="btn-primary" onclick="openNewProject()"><i class="ti ti-plus"></i> Novo projeto</button>
    </div>
    <div class="projects-grid" id="projects-grid"></div>
  </div>

  <div id="tab-linhas" style="display:none">
    <div class="toolbar">
      <input type="text" id="search-yarn" placeholder="Buscar linhas..." oninput="renderYarns()" />
      <button class="btn-primary" onclick="openNewYarn()"><i class="ti ti-plus"></i> Nova linha</button>
    </div>
    <div class="yarns-grid" id="yarns-grid"></div>
  </div>
</div>

<div id="modal-container"></div>

<script>
const STORAGE_KEY = 'croche_organizer_v1';

const defaultState = {
  projects: [
    { id: 1, name: 'Amigurumi coelhinho', status: 'em-andamento', notes: 'Presente de aniversário. Tamanho médio.', yarns: [1,2], img: null },
    { id: 2, name: 'Bolsa de mercado', status: 'planejado', notes: 'Linha resistente, malha mais aberta.', yarns: [3], img: null },
    { id: 3, name: 'Cachecol de inverno', status: 'concluido', notes: 'Ponto rendado. Ficou lindo!', yarns: [2,4], img: null },
  ],
  yarns: [
    { id: 1, name: 'Cisne 100% algodão', color: '#F4A261', weight: 'Fino (DK)', stock: '3 novelos', notes: '' },
    { id: 2, name: 'Fio Cru natural', color: '#E9C46A', weight: 'Médio (Worsted)', stock: '5 novelos', notes: '' },
    { id: 3, name: 'Barbante 6 verde', color: '#2A9D8F', weight: 'Grosso (Bulky)', stock: '2 rolos', notes: '' },
    { id: 4, name: 'Linha azul petróleo', color: '#264653', weight: 'Fino (DK)', stock: '1 novelo', notes: '' },
  ],
  nextProjId: 4,
  nextYarnId: 5
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(defaultState));
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const ind = document.getElementById('save-indicator');
    if (ind) {
      ind.className = 'save-indicator saved';
      ind.innerHTML = '<i class="ti ti-check"></i> <span>Salvo</span>';
      clearTimeout(ind._t);
      ind._t = setTimeout(() => {
        ind.innerHTML = '<i class="ti ti-device-floppy"></i> <span>Salvo automaticamente</span>';
      }, 1800);
    }
  } catch(e) {}
}

const state = loadState();

const statusLabel = { 'planejado': 'Planejado', 'em-andamento': 'Em andamento', 'concluido': 'Concluído' };

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['projetos','linhas'][i] === tab));
  document.getElementById('tab-projetos').style.display = tab === 'projetos' ? '' : 'none';
  document.getElementById('tab-linhas').style.display = tab === 'linhas' ? '' : 'none';
  if (tab === 'linhas') renderYarns();
}

function renderProjects() {
  const q = (document.getElementById('search-proj').value || '').toLowerCase();
  const st = document.getElementById('filter-status').value;
  const grid = document.getElementById('projects-grid');
  const filtered = state.projects.filter(p => p.name.toLowerCase().includes(q) && (!st || p.status === st));
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><i class="ti ti-mood-empty"></i><p>Nenhum projeto encontrado</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const yarnObjs = p.yarns.map(id => state.yarns.find(y => y.id === id)).filter(Boolean);
    const pills = yarnObjs.map(y => `<span class="yarn-pill" style="background:${y.color}28;color:${y.color}">${y.name}</span>`).join('');
    const imgEl = p.img ? `<img src="${p.img}" alt="${p.name}">` : `<i class="ti ti-needle-thread no-img"></i>`;
    return `<div class="project-card" onclick="openProject(${p.id})">
      <div class="img-area">${imgEl}<span class="status-badge abs status-${p.status}">${statusLabel[p.status]}</span></div>
      <div class="card-body">
        <div class="card-title">${p.name}</div>
        ${p.notes ? `<div class="card-meta">${p.notes.substring(0,65)}${p.notes.length>65?'…':''}</div>` : ''}
        <div class="yarn-pills">${pills}</div>
      </div>
    </div>`;
  }).join('');
}

function renderYarns() {
  const q = (document.getElementById('search-yarn').value || '').toLowerCase();
  const grid = document.getElementById('yarns-grid');
  const filtered = state.yarns.filter(y => y.name.toLowerCase().includes(q));
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><i class="ti ti-mood-empty"></i><p>Nenhuma linha encontrada</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(y => {
    const used = state.projects.filter(p => p.yarns.includes(y.id)).length;
    return `<div class="yarn-card" onclick="openYarn(${y.id})">
      <div class="yarn-swatch" style="background:${y.color}"></div>
      <div>
        <div class="yarn-name">${y.name}</div>
        <div class="yarn-detail">${y.weight}</div>
        <div class="yarn-stock">${y.stock} · ${used} projeto${used !== 1 ? 's' : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function yarnChecklist(selectedIds) {
  if (!state.yarns.length) return '<p style="font-size:13px;color:var(--text-secondary)">Nenhuma linha cadastrada ainda. Adicione linhas na aba "Minhas linhas".</p>';
  return state.yarns.map(y => `
    <label class="yarn-check-item">
      <input type="checkbox" value="${y.id}" ${selectedIds.includes(y.id) ? 'checked' : ''}>
      <span class="swatch-sm" style="background:${y.color}"></span>
      <span>${y.name} <span style="color:var(--text-secondary);font-size:12px">· ${y.weight}</span></span>
    </label>`).join('');
}

function getCheckedYarns(container) {
  return [...container.querySelectorAll('input[type=checkbox]:checked')].map(cb => parseInt(cb.value));
}

function previewImg(e, areaId, hiddenId) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const area = document.getElementById(areaId);
    area.innerHTML = `<img src="${ev.target.result}" alt="preview"><input type="file" accept="image/*" onchange="previewImg(event,'${areaId}','${hiddenId}')">`;
    document.getElementById(hiddenId).value = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function openNewProject() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h2>Novo projeto</h2><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
        <div class="modal-body">
          <div class="field"><label>Foto do projeto</label>
            <div class="img-upload-area" id="upload-area">
              <input type="file" accept="image/*" onchange="previewImg(event,'upload-area','proj-img-data')">
              <i class="ti ti-photo-up" style="font-size:28px;color:var(--text-tertiary)"></i>
              <span class="up-text">Clique para adicionar foto</span>
            </div>
            <input type="hidden" id="proj-img-data">
          </div>
          <div class="field"><label>Nome do projeto</label><input type="text" id="proj-name" placeholder="Ex: Amigurumi urso"></div>
          <div class="field"><label>Status</label>
            <select id="proj-status" style="width:100%">
              <option value="planejado">Planejado</option>
              <option value="em-andamento">Em andamento</option>
              <option value="concluido">Concluído</option>
            </select>
          </div>
          <div class="field"><label>Notas</label><textarea id="proj-notes" placeholder="Pontos usados, tamanho, observações..."></textarea></div>
          <div class="field"><label>Linhas para este projeto</label>
            <div class="yarn-checklist" id="yarn-checklist">${yarnChecklist([])}</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn-primary" onclick="saveNewProject()"><i class="ti ti-check"></i> Salvar</button>
        </div>
      </div>
    </div>`;
}

function saveNewProject() {
  const name = document.getElementById('proj-name').value.trim();
  if (!name) { alert('Digite um nome para o projeto'); return; }
  const yarns = getCheckedYarns(document.getElementById('yarn-checklist'));
  state.projects.push({
    id: state.nextProjId++,
    name,
    status: document.getElementById('proj-status').value,
    notes: document.getElementById('proj-notes').value.trim(),
    yarns,
    img: document.getElementById('proj-img-data').value || null
  });
  saveState(); closeModal(); renderProjects();
}

function openProject(id) {
  const p = state.projects.find(x => x.id === id); if (!p) return;
  const yarnObjs = p.yarns.map(yid => state.yarns.find(y => y.id === yid)).filter(Boolean);
  const pills = yarnObjs.map(y => `<span class="yarn-pill" style="background:${y.color}28;color:${y.color}">${y.name}</span>`).join('');
  const imgEl = p.img
    ? `<img src="${p.img}" alt="${p.name}" class="detail-img">`
    : `<div class="detail-img"><i class="ti ti-needle-thread" style="font-size:48px;color:var(--text-tertiary)"></i></div>`;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h2>${p.name}</h2><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
        <div class="modal-body">
          ${imgEl}
          <div><span class="detail-label">Status</span><span class="status-badge status-${p.status}">${statusLabel[p.status]}</span></div>
          ${p.notes ? `<div><span class="detail-label">Notas</span><p style="font-size:14px;color:var(--text)">${p.notes}</p></div>` : ''}
          <div><span class="detail-label">Linhas</span>
            <div class="yarn-pills" style="margin-top:6px">
              ${pills || '<span style="font-size:13px;color:var(--text-tertiary)">Nenhuma linha associada</span>'}
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-danger" onclick="deleteProject(${id})"><i class="ti ti-trash"></i> Excluir</button>
          <button class="btn-outline" onclick="closeModal()">Fechar</button>
          <button class="btn-primary" onclick="editProject(${id})"><i class="ti ti-edit"></i> Editar</button>
        </div>
      </div>
    </div>`;
}

function editProject(id) {
  const p = state.projects.find(x => x.id === id); if (!p) return;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h2>Editar projeto</h2><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
        <div class="modal-body">
          <div class="field"><label>Foto do projeto</label>
            <div class="img-upload-area" id="upload-area-edit">
              ${p.img ? `<img src="${p.img}" alt="foto"><input type="file" accept="image/*" onchange="previewImg(event,'upload-area-edit','proj-img-edit')">` : `<input type="file" accept="image/*" onchange="previewImg(event,'upload-area-edit','proj-img-edit')"><i class="ti ti-photo-up" style="font-size:28px;color:var(--text-tertiary)"></i><span class="up-text">Clique para trocar a foto</span>`}
            </div>
            <input type="hidden" id="proj-img-edit" value="${p.img || ''}">
          </div>
          <div class="field"><label>Nome</label><input type="text" id="edit-name" value="${p.name}"></div>
          <div class="field"><label>Status</label>
            <select id="edit-status" style="width:100%">
              <option value="planejado" ${p.status==='planejado'?'selected':''}>Planejado</option>
              <option value="em-andamento" ${p.status==='em-andamento'?'selected':''}>Em andamento</option>
              <option value="concluido" ${p.status==='concluido'?'selected':''}>Concluído</option>
            </select>
          </div>
          <div class="field"><label>Notas</label><textarea id="edit-notes">${p.notes}</textarea></div>
          <div class="field"><label>Linhas</label>
            <div class="yarn-checklist" id="yarn-checklist-edit">${yarnChecklist(p.yarns)}</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" onclick="openProject(${id})">Cancelar</button>
          <button class="btn-primary" onclick="saveEditProject(${id})"><i class="ti ti-check"></i> Salvar</button>
        </div>
      </div>
    </div>`;
}

function saveEditProject(id) {
  const p = state.projects.find(x => x.id === id); if (!p) return;
  const name = document.getElementById('edit-name').value.trim();
  if (name) p.name = name;
  p.status = document.getElementById('edit-status').value;
  p.notes = document.getElementById('edit-notes').value.trim();
  p.yarns = getCheckedYarns(document.getElementById('yarn-checklist-edit'));
  const newImg = document.getElementById('proj-img-edit').value;
  if (newImg) p.img = newImg;
  saveState(); closeModal(); renderProjects();
}

function deleteProject(id) {
  if (!confirm('Excluir este projeto?')) return;
  state.projects = state.projects.filter(p => p.id !== id);
  saveState(); closeModal(); renderProjects();
}

function openNewYarn() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h2>Nova linha</h2><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
        <div class="modal-body">
          <div class="field"><label>Nome da linha</label><input type="text" id="yarn-name" placeholder="Ex: Barbante 4 colorido"></div>
          <div style="display:flex;gap:12px;align-items:flex-end">
            <div class="field" style="flex:1"><label>Cor</label><input type="color" id="yarn-color" value="#E9C46A" style="width:100%;height:42px;padding:3px;cursor:pointer;border-radius:var(--radius-md);border:0.5px solid var(--border-md)"></div>
            <div class="field" style="flex:2"><label>Espessura</label>
              <select id="yarn-weight" style="width:100%">
                <option>Fino (DK)</option>
                <option>Médio (Worsted)</option>
                <option>Grosso (Bulky)</option>
                <option>Super grosso</option>
                <option>Linha de bordado</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Estoque</label><input type="text" id="yarn-stock" placeholder="Ex: 4 novelos"></div>
          <div class="field"><label>Notas</label><textarea id="yarn-notes" placeholder="Marca, composição, agulha recomendada..."></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn-primary" onclick="saveNewYarn()"><i class="ti ti-check"></i> Salvar</button>
        </div>
      </div>
    </div>`;
}

function saveNewYarn() {
  const name = document.getElementById('yarn-name').value.trim();
  if (!name) { alert('Digite um nome para a linha'); return; }
  state.yarns.push({
    id: state.nextYarnId++,
    name,
    color: document.getElementById('yarn-color').value,
    weight: document.getElementById('yarn-weight').value,
    stock: document.getElementById('yarn-stock').value.trim(),
    notes: document.getElementById('yarn-notes').value.trim()
  });
  saveState(); closeModal(); renderYarns();
}

function openYarn(id) {
  const y = state.yarns.find(x => x.id === id); if (!y) return;
  const projs = state.projects.filter(p => p.yarns.includes(id));
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h2>${y.name}</h2><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
        <div class="modal-body">
          <div style="display:flex;align-items:center;gap:16px">
            <div style="width:60px;height:60px;border-radius:50%;background:${y.color};border:0.5px solid var(--border);flex-shrink:0"></div>
            <div>
              <p style="font-size:15px;font-weight:500;color:var(--text)">${y.name}</p>
              <p style="font-size:13px;color:var(--text-secondary);margin-top:3px">${y.weight}</p>
              <p style="font-size:13px;color:var(--text-secondary)">${y.stock}</p>
            </div>
          </div>
          ${y.notes ? `<div><span class="detail-label">Notas</span><p style="font-size:14px;color:var(--text)">${y.notes}</p></div>` : ''}
          <div>
            <span class="detail-label">Usada em ${projs.length} projeto${projs.length!==1?'s':''}</span>
            ${projs.length
              ? `<div style="margin-top:6px">${projs.map(p=>`<div class="used-in-item">${p.name}<span class="status-badge status-${p.status}">${statusLabel[p.status]}</span></div>`).join('')}</div>`
              : '<p style="font-size:13px;color:var(--text-tertiary)">Nenhum projeto usa esta linha ainda</p>'}
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-danger" onclick="deleteYarn(${id})"><i class="ti ti-trash"></i> Excluir</button>
          <button class="btn-outline" onclick="closeModal()">Fechar</button>
          <button class="btn-primary" onclick="editYarn(${id})"><i class="ti ti-edit"></i> Editar</button>
        </div>
      </div>
    </div>`;
}

function editYarn(id) {
  const y = state.yarns.find(x => x.id === id); if (!y) return;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h2>Editar linha</h2><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
        <div class="modal-body">
          <div class="field"><label>Nome</label><input type="text" id="edit-yarn-name" value="${y.name}"></div>
          <div style="display:flex;gap:12px;align-items:flex-end">
            <div class="field" style="flex:1"><label>Cor</label><input type="color" id="edit-yarn-color" value="${y.color}" style="width:100%;height:42px;padding:3px;cursor:pointer;border-radius:var(--radius-md);border:0.5px solid var(--border-md)"></div>
            <div class="field" style="flex:2"><label>Espessura</label>
              <select id="edit-yarn-weight" style="width:100%">
                ${['Fino','Médio','Grosso','Super grosso','Linha de bordado'].map(w=>`<option ${y.weight===w?'selected':''}>${w}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="field"><label>Estoque</label><input type="text" id="edit-yarn-stock" value="${y.stock}"></div>
          <div class="field"><label>Notas</label><textarea id="edit-yarn-notes">${y.notes}</textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" onclick="openYarn(${id})">Cancelar</button>
          <button class="btn-primary" onclick="saveEditYarn(${id})"><i class="ti ti-check"></i> Salvar</button>
        </div>
      </div>
    </div>`;
}

function saveEditYarn(id) {
  const y = state.yarns.find(x => x.id === id); if (!y) return;
  const name = document.getElementById('edit-yarn-name').value.trim();
  if (name) y.name = name;
  y.color = document.getElementById('edit-yarn-color').value;
  y.weight = document.getElementById('edit-yarn-weight').value;
  y.stock = document.getElementById('edit-yarn-stock').value.trim();
  y.notes = document.getElementById('edit-yarn-notes').value.trim();
  saveState(); closeModal(); renderYarns();
}

function deleteYarn(id) {
  if (!confirm('Excluir esta linha? Ela será removida dos projetos associados.')) return;
  state.yarns = state.yarns.filter(y => y.id !== id);
  state.projects.forEach(p => { p.yarns = p.yarns.filter(yid => yid !== id); });
  saveState(); closeModal(); renderYarns();
}

renderProjects();
</script>
</body>
</html>
